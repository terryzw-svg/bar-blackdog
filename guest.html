<script>
// ===== DATA LOADER =====
// Load from data.json (same directory), fall back to embedded demo data
var app = { cards: [], records: [], nextId: 1, wallets: {}, giftTickets: [] };

/*
DEMO_DATA_PLACEHOLDER
*/

function loadData() {
  fetch('data.json?' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      app.cards = d.cards || [];
      app.wallets = d.wallets || {};
      app.giftTickets = d.giftTickets || [];
    })
    .catch(function() {
      console.log('data.json not found, loading demo data from embedded fallback');
    });
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(function() { el.classList.add('hidden'); }, 2500);
}

function getWallet(code) {
  var w = app.wallets[code];
  return w ? { balance: w.balance, history: w.history } : null;
}

function findCardByInviteCode(code) {
  if (!code) return null;
  var upper = code.toUpperCase().trim();
  return app.cards.find(function(c) { return c.inviteCode && c.inviteCode.toUpperCase() === upper; });
}

// ===== SEARCH =====
// mask phone: 138****1111
function maskPhone(p) { return p ? p.slice(0,3) + '****' + p.slice(-4) : ''; }

// Search: phone OR invite code (NOT name alone ÔÇö security)
function search() {
  var query = document.getElementById('custSearch').value.trim();
  if (!query) return;

  // Check if query looks like a phone number
  var isPhone = /^1\d{10}$/.test(query);

  var cards = app.cards.filter(function(c) {
    // Card ID exact match (for debug/boss use)
    if (c.id === query) return true;
    // Phone exact match
    if (c.phone === query) return true;
    // Invite code exact match
    if (c.inviteCode && c.inviteCode.toUpperCase() === query.toUpperCase()) return true;
    // Phone partial match (loose search)
    if (c.phone.indexOf(query) !== -1) return true;
    return false;
  });

  var result = document.getElementById('custResult');
  var empty = document.getElementById('custEmpty');

  if (cards.length === 0) {
    if (isPhone) {
      result.classList.add('hidden');
      empty.classList.remove('hidden');
      return toast('Šť¬Šëżňł░Ŕ»ąňĆĚšáüň»╣ň║öšÜäŠťłňŹíŃÇé\nňĆ»ń╗ąšÄ░ňť║ŠëżŔÇüŠŁ┐ňŐ×ńŞÇň╝á´╝ü');
    }
    result.classList.add('hidden');
    empty.classList.remove('hidden');
    return toast('Šť¬Šëżňł░ňî╣ÚůŹšÜäŠťłňŹíŃÇé\nŔ»ĚšöĘŠëőŠť║ňĆĚŠłľÚéÇŔ»ĚšáüŠčąŔ»óŃÇé');
  }

  if (cards.length === 1) {
    showCard(cards[0]);
    return;
  }

  empty.classList.add('hidden');
  result.classList.remove('hidden');
  var sm = { active:{label:'šöčŠĽłńŞş',c:'text-green-600'}, warning:{label:'ňŹ│ň░ćňł░Šťč',c:'text-yellow-600'}, expired:{label:'ňĚ▓Ŕ┐çŠťč',c:'text-red-500'}, used:{label:'ňĚ▓šöĘň«î',c:'text-gray-400'} };
  var html = '<div class="bg-white rounded-3xl p-6 card-shadow">'
    + '<p class="text-sm font-bold text-gray-700 mb-3">Šëżňł░ ' + cards.length + ' ň╝áňî╣ÚůŹšÜäňŹí´╝Ü</p>'
    + '<div class="space-y-2">';
  cards.forEach(function(c, i) {
    var s = sm[c.status];
    html += '<button onclick="showCardById(\'' + c.id + '\')" class="w-full px-4 py-3 bg-gray-50 rounded-xl text-left hover:bg-red-50 active:scale-[0.98] transition-all border border-gray-100">'
    + '<span class="font-bold text-sm">' + c.name + '</span>'
    + '<span class="text-xs text-gray-400 ml-2">' + maskPhone(c.phone) + '</span>'
    + '<span class="float-right text-xs font-bold ' + s.c + '">' + s.label + '</span>'
    + '<br><span class="text-xs text-gray-400">ňëęńŻÖ ' + (c.total-c.used) + '/' + c.total + ' ŠŁ»</span>'
    + '</button>';
  });
  html += '</div></div>';
  result.innerHTML = html;
}

function showCardById(id) {
  var c = app.cards.find(function(x){return x.id===id;});
  if (c) showCard(c);
}

function findCardByInvCode(code) {
  return app.cards.find(function(c) { return c.inviteCode && c.inviteCode.toUpperCase() === code.toUpperCase().trim(); });
}

  } else if (card.status === 'active') {

  } else {

    + '<div class="h-2.5 rounded-full progress-bar" style="width:' + pct + '%;background:' + s.color + '"></div>'
    + '</div>'
    + '</div>'
    + '<div class="space-y-2.5 text-sm bg-gray-50 rounded-2xl p-4">'
    + '<div class="flex justify-between"><span class="text-gray-400">ňŹíňĆĚ</span><span class="font-bold text-gray-700 font-mono">' + card.id + '</span></div>'
    + '<div class="flex justify-between"><span class="text-gray-400">ňžôňÉŹ</span><span class="font-bold text-gray-700">' + card.name + '</span></div>'
    + '<div class="flex justify-between"><span class="text-gray-400">Ŕ┤şń╣░ŠŚąŠťč</span><span class="text-gray-600">' + card.buyDate + '</span></div>'
    + '<div class="flex justify-between"><span class="text-gray-400">ňł░ŠťčŠŚąŠťč</span><span class="text-gray-600">' + card.expireDate + '</span></div>'
    + '<div class="flex justify-between"><span class="text-gray-400">ňëęńŻÖňĄęŠĽ░</span><span class="font-bold" style="color:' + s.color + '">' + daysText + '</span></div>'
    + '</div>';

  // Wallet
  if (fundBalance > 0) {
    html += '<div class="mt-4 bg-green-50 rounded-2xl p-4 text-center">'
    + '<p class="text-xs text-green-600 font-bold mb-1">ňľŁÚůĺňč║ÚçĹ</p>'
    + '<p class="text-3xl font-black text-green-700">' + fundBalance.toFixed(2) + '</p>'
    + '<p class="text-xs text-green-500 mt-1">š╗şňŹíŠłľŠÂłŔ┤╣ňĆ»ŠŐÁŠëú</p>'
    + '</div>';
  }

  // Invite code
  if (card.inviteCode) {
    html += '<div class="mt-4 bg-amber-50 rounded-2xl p-4 text-center">'
    + '<p class="text-xs text-amber-600 font-bold mb-1">ńŻášÜäÚéÇŔ»Ěšáü</p>'
    + '<p class="text-2xl font-black text-amber-700 font-mono tracking-widest">' + card.inviteCode + '</p>'
    + '<p class="text-xs text-amber-500 mt-1">ŠťőňĆőňŐ×ňŹíŠŐąŔ┐ÖńŞ¬šáü´╝îńŻášÖŻňżŚ1ŠŁ»ŔÁáÚą«</p>';
    if (inviteCount > 0) {
      html += '<p class="text-xs text-amber-400 mt-0.5">ŠťČŠťłňĚ▓ÚéÇŔ»Ě ' + inviteCount + ' ń║║</p>';
    }
    html += '<button onclick="copyInviteText()" class="mt-2 px-4 py-2 bg-amber-500 text-white rounded-xl text-xs font-bold hover:bg-amber-600 active:scale-95 transition-all w-full">ŔŻČňĆĹÚéÇŔ»Ěš╗ÖŠťőňĆő</button>'
    + '</div>';

  // Gift tickets
  var tickets = (app.giftTickets || []).filter(function(t) {
    return t.ownerPhone === card.phone && (t.status === 'unused' || t.status === 'transferred');

  if (tickets.length > 0) {
    html += '<div class="mt-4 bg-pink-50 rounded-2xl p-4">';

}

    'ńŻáń╣čŠŁąňŐ×šÜäŔ»Ł´╝îňíźŠłĹšÜäÚéÇŔ»Ěšáü \n\n' +
    'ÚéÇŔ»Ěšáü´╝Ü' + card.inviteCode + '\n' +

    'ńŻáňŐ×ňŹí ŠłĹšÖŻňżŚ1ŠŁ»ŔÁáÚą«\n' +

function copyGiftShare(btn) {

// ===== INIT =====

</script>
